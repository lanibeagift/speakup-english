<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LovingLanguages — Learn English</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0c0a;--card:#1e1a15;--card2:#242018;
  --border:#2e2820;--border2:#3a3228;
  --gold:#d4a843;--gold2:#f0c96a;--gold-dim:#8a6e2a;
  --gold-bg:rgba(212,168,67,0.08);
  --text:#f0ead8;--text2:#9a9080;--text3:#6a6058;
  --green:#4caf7d;--red:#e05252;
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;position:relative;overflow:hidden}
body::before{content:'';position:fixed;top:-20%;right:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(212,168,67,0.06) 0%,transparent 70%);pointer-events:none}
body::after{content:'';position:fixed;bottom:-20%;left:-10%;width:400px;height:400px;background:radial-gradient(circle,rgba(212,168,67,0.04) 0%,transparent 70%);pointer-events:none}

.page{width:100%;max-width:400px;position:relative;z-index:1;animation:fadeUp 0.5s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.brand{text-align:center;margin-bottom:2rem}
.brand-logo{width:56px;height:56px;background:var(--gold);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin:0 auto 1rem}
.brand h1{font-family:'Fraunces',serif;font-size:2rem;font-weight:900;letter-spacing:-1px;color:var(--text)}
.brand h1 em{color:var(--gold);font-style:italic}
.brand p{font-size:0.85rem;color:var(--text3);margin-top:0.4rem}

.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2rem}

.card h2{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:700;margin-bottom:0.3rem}
.card p{font-size:0.82rem;color:var(--text2);margin-bottom:1.5rem;line-height:1.5}

.btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:0.8rem;padding:0.85rem 1rem;border:1.5px solid var(--border2);border-radius:12px;background:var(--card2);font-family:'Outfit',sans-serif;font-size:0.92rem;font-weight:500;color:var(--text);cursor:pointer;transition:all 0.2s}
.btn-google:hover{border-color:var(--gold-dim);background:var(--gold-bg)}
.btn-google:disabled{opacity:0.5;cursor:not-allowed}
.google-svg{width:18px;height:18px;flex-shrink:0}

.divider{display:flex;align-items:center;gap:0.8rem;margin:1.2rem 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-size:0.72rem;color:var(--text3)}

.features{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin-top:1.2rem}
.feat{display:flex;align-items:center;gap:0.4rem;font-size:0.78rem;color:var(--text3)}
.feat-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0}

.status{text-align:center;font-size:0.8rem;color:var(--text2);margin-top:0.8rem;min-height:1.2rem}
.status.error{color:var(--red)}

.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="page">
  <div class="brand">
    <div class="brand-logo">🗣️</div>
    <h1>Loving<em>Languages</em></h1>
    <p>Dictation & Shadowing — Learn English the right way</p>
  </div>

  <div class="card">
    <h2>Welcome back 👋</h2>
    <p>Sign in to track your streak, progress, and learning history.</p>

    <button class="btn-google" id="google-btn" onclick="signInGoogle()">
      <svg class="google-svg" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="status" id="status"></div>

    <div class="divider"><span>what you get</span></div>

    <div class="features">
      <div class="feat"><div class="feat-dot"></div>✍️ Dictation</div>
      <div class="feat"><div class="feat-dot"></div>🎤 Shadowing</div>
      <div class="feat"><div class="feat-dot"></div>🔥 Daily streak</div>
      <div class="feat"><div class="feat-dot"></div>📊 Progress tracking</div>
      <div class="feat"><div class="feat-dot"></div>📅 Study history</div>
      <div class="feat"><div class="feat-dot"></div>🎯 4 topics</div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyD4F3w5bZWqixn_d2R1TjrucRLcAi0GAfA",
  authDomain: "speakup-english-91ca9.firebaseapp.com",
  projectId: "speakup-english-91ca9",
  storageBucket: "speakup-english-91ca9.firebasestorage.app",
  messagingSenderId: "592364060883",
  appId: "1:592364060883:web:339f07691f763681c9d426"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// Auto redirect if already logged in
auth.onAuthStateChanged(async user => {
  if (!user) return;
  // Check whitelist before redirecting
  try {
    const allowed = await db.collection('allowed_emails').doc(user.email).get();
    if (allowed.exists) {
      window.location.href = 'dashboard.html';
    } else {
      await auth.signOut();
    }
  } catch(e) {
    // If can't check (first load), just go to dashboard
    window.location.href = 'dashboard.html';
  }
});

function setStatus(msg, isError=false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (isError ? ' error' : '');
}

const GOOGLE_BTN_HTML = `<svg class="google-svg" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Continue with Google`;

async function signInGoogle() {
  const btn = document.getElementById('google-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Signing in...';
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    const result = await auth.signInWithPopup(provider);
    const user = result.user;

    // ── Check whitelist ──────────────────────────────
    setStatus('Checking access…');
    const allowed = await db.collection('allowed_emails').doc(user.email).get();
    if (!allowed.exists) {
      await auth.signOut();
      btn.disabled = false;
      btn.innerHTML = GOOGLE_BTN_HTML;
      setStatus('⛔ Your email is not on the access list. Please contact the admin.', true);
      return;
    }

    // ── Allowed — create profile if new ─────────────
    const userRef = db.collection('users').doc(user.uid);
    const doc = await userRef.get();
    if (!doc.exists) {
      await userRef.set({
        name: user.displayName,
        email: user.email,
        photo: user.photoURL,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        streak: 0, longestStreak: 0, lastStudyDate: null,
        totalSessions: 0, totalCorrect: 0, totalWrong: 0, totalSeconds: 0,
        progress: {}, unlocked: {}
      });
    }
    window.location.href = 'dashboard.html';

  } catch(err) {
    btn.disabled = false;
    btn.innerHTML = GOOGLE_BTN_HTML;
    if (err.code === 'auth/popup-closed-by-user') setStatus('Sign-in cancelled.');
    else if (err.code === 'auth/popup-blocked') setStatus('Popup blocked — please allow popups for this site.', true);
    else setStatus('Error: ' + err.message, true);
  }
}
</script>
</body>
</html>
