<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LovingLanguages — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0c0a;--card:#1e1a15;--card2:#242018;
  --border:#2e2820;--border2:#3a3228;
  --gold:#d4a843;--gold2:#f0c96a;--gold-dim:#8a6e2a;
  --gold-bg:rgba(212,168,67,0.08);--gold-bg2:rgba(212,168,67,0.15);
  --text:#f0ead8;--text2:#9a9080;--text3:#6a6058;
  --green:#4caf7d;--green-bg:rgba(76,175,125,0.12);
  --red:#e05252;
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* NAV */
nav{background:rgba(14,12,10,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0.8rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.nav-brand{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:900}
.nav-brand em{color:var(--gold);font-style:italic}
.nav-right{display:flex;align-items:center;gap:0.8rem}
.avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--border2)}
.avatar-placeholder{width:32px;height:32px;border-radius:50%;background:var(--gold-bg2);display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:600;color:var(--gold2);border:2px solid var(--border2)}
.nav-name{font-size:0.82rem;color:var(--text2);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-logout{background:none;border:1px solid var(--border2);border-radius:7px;padding:0.28rem 0.65rem;font-family:'Outfit',sans-serif;font-size:0.75rem;color:var(--text3);cursor:pointer;transition:all 0.2s}
.btn-logout:hover{border-color:var(--red);color:var(--red)}

/* MAIN */
main{max-width:860px;margin:0 auto;padding:1.5rem 1.5rem 4rem}

/* GREETING */
.greeting{margin-bottom:1.5rem}
.greeting-sub{font-size:0.78rem;color:var(--gold);text-transform:uppercase;letter-spacing:1.2px;font-weight:600;margin-bottom:0.3rem}
.greeting h2{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:700;line-height:1.2}
.greeting h2 em{font-style:italic;color:var(--gold)}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.8rem;margin-bottom:1.2rem}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem 1.1rem}
.stat-label{font-size:0.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:0.35rem}
.stat-value{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:700;color:var(--gold);line-height:1}
.stat-unit{font-size:0.78rem;color:var(--text3);font-family:'Outfit',sans-serif;font-weight:400}
.stat-card.streak-card{border-color:var(--gold-dim);background:var(--gold-bg)}

/* STREAK WEEK */
.streak-week{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem 1.2rem;margin-bottom:1.2rem}
.week-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.8rem}
.week-title{font-size:0.78rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px}
.week-days{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.day-col{text-align:center}
.day-name{font-size:0.65rem;color:var(--text3);margin-bottom:4px;text-transform:uppercase}
.day-dot{width:100%;aspect-ratio:1;border-radius:8px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:0.75rem;transition:all 0.2s}
.day-dot.done{background:var(--green);color:#0a1a12}
.day-dot.today{border:2px solid var(--gold)}

/* TOPICS */
.section-title{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:700;margin-bottom:0.8rem}
.topics-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;margin-bottom:1.2rem}
.topic-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:all 0.2s}
.topic-card:hover{border-color:var(--gold-dim);transform:translateY(-2px)}
.topic-top{padding:1rem 1.2rem 0.8rem;display:flex;align-items:center;gap:0.8rem;border-bottom:1px solid var(--border)}
.topic-emoji{font-size:1.6rem;line-height:1;flex-shrink:0}
.topic-num{font-size:0.65rem;color:var(--gold);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:0.15rem}
.topic-name{font-size:0.88rem;font-weight:500;color:var(--text);line-height:1.3}
.topic-body{padding:0.8rem 1.2rem}
.prog-row{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.4rem}
.prog-icon{font-size:0.72rem;width:18px;text-align:center}
.prog-rail{flex:1;height:4px;background:var(--border2);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:var(--gold);border-radius:4px;transition:width 0.6s}
.prog-pct{font-size:0.68rem;color:var(--text3);width:28px;text-align:right}
.topic-actions{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-top:0.7rem}
.btn-mode{padding:0.45rem;border-radius:8px;border:1px solid var(--border2);background:var(--card2);font-family:'Outfit',sans-serif;font-size:0.75rem;font-weight:500;color:var(--text2);cursor:pointer;transition:all 0.18s;text-align:center}
.btn-mode:hover{background:var(--gold);color:#0e0c0a;border-color:var(--gold)}

/* HISTORY */
.history-list{display:flex;flex-direction:column;gap:0.5rem}
.history-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:0.8rem 1rem;display:flex;align-items:center;gap:1rem}
.h-icon{font-size:1.2rem;flex-shrink:0}
.h-info{flex:1;min-width:0}
.h-title{font-size:0.85rem;font-weight:500;color:var(--text)}
.h-meta{font-size:0.72rem;color:var(--text3);margin-top:0.15rem}
.h-right{text-align:right;flex-shrink:0}
.h-correct{font-size:0.82rem;font-weight:500;color:var(--green)}
.h-date{font-size:0.7rem;color:var(--text3);margin-top:0.1rem}
.empty-state{text-align:center;padding:2rem;color:var(--text3);font-size:0.85rem}

/* Loading */
.loading{text-align:center;padding:3rem;color:var(--text3)}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:600px){
  nav{padding:0.7rem 1rem}
  main{padding:1rem 1rem 3rem}
  .stats-grid{grid-template-columns:1fr 1fr}
  .topics-grid{grid-template-columns:1fr}
  .greeting h2{font-size:1.4rem}
}
</style>
</head>
<body>
<nav>
  <div class="nav-brand">Loving<em>Languages</em></div>
  <div class="nav-right">
    <div id="nav-avatar" class="avatar-placeholder">?</div>
    <span class="nav-name" id="nav-name">...</span>
    <button class="btn-logout" onclick="signOut()">Sign out</button>
  </div>
</nav>

<main>
  <div id="loading" class="loading"><div class="spinner"></div></div>
  <div id="content" style="display:none">

    <!-- GREETING -->
    <div class="greeting">
      <div class="greeting-sub" id="greeting-time">Good day</div>
      <h2 id="greeting-name">Welcome back, <em>...</em></h2>
    </div>

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card streak-card">
        <div class="stat-label">🔥 Current streak</div>
        <div class="stat-value" id="stat-streak">0</div>
        <div class="stat-unit">days</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">⏱ Total time</div>
        <div class="stat-value" id="stat-time">0</div>
        <div class="stat-unit" id="stat-time-unit">min</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">✅ Correct</div>
        <div class="stat-value" id="stat-correct">0</div>
        <div class="stat-unit">sentences</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">📚 Sessions</div>
        <div class="stat-value" id="stat-sessions">0</div>
        <div class="stat-unit">total</div>
      </div>
    </div>

    <!-- STREAK WEEK -->
    <div class="streak-week">
      <div class="week-header">
        <span class="week-title">This week</span>
        <span style="font-size:0.72rem;color:var(--text3)">Longest: <span id="longest-streak" style="color:var(--gold)">0</span> days</span>
      </div>
      <div class="week-days" id="week-days"></div>
    </div>

    <!-- TOPICS -->
    <div class="section-title">Your lessons</div>
    <div class="topics-grid" id="topics-grid"></div>

    <!-- HISTORY -->
    <div class="section-title">Recent sessions</div>
    <div class="history-list" id="history-list"></div>

  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyD4F3w5bZWqixn_d2R1TjrucRLcAi0GAfA",
  authDomain: "speakup-english-91ca9.firebaseapp.com",
  projectId: "speakup-english-91ca9",
  storageBucket: "speakup-english-91ca9.firebasestorage.app",
  messagingSenderId: "592364060883",
  appId: "1:592364060883:web:339f07691f763681c9d426"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const TOPICS = [
  {id:1, emoji:'👤', title:'Tell me about yourself', audio:'topic1.mp3'},
  {id:2, emoji:'🌸', title:"A Small Speech for Women's Day", audio:'topic2.mp3'},
  {id:3, emoji:'👨‍👩‍👧‍👦', title:'Talking about Family', audio:'topic3.mp3'},
  {id:4, emoji:'🏠', title:'Inviting a Guest Home', audio:'Topic4.mp3'},
  {id:5, emoji:'🔄', title:'Back Again!', audio:'topic5.mp3'},
  {id:6, emoji:'🏖️', title:'A Day at the Beach', audio:'topic6.mp3'},
  {id:7, emoji:'🛒', title:'A Day at the Market', audio:'topic7.mp3'},
  {id:8, emoji:'🥑', title:'A Day at the Coffee Shop', audio:'topic.mp3'},
  {id:9, emoji:'🏮', title:'Local Tips for Hoi An', audio:'topic.mp3'},
  {id:10, emoji:'🚗', title:'The road to hue', audio:'topic.mp3'},
];

auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = 'index.html'; return; }

  // Set avatar
  const avatarEl = document.getElementById('nav-avatar');
  if (user.photoURL) {
    avatarEl.outerHTML = `<img class="avatar" src="${user.photoURL}" id="nav-avatar">`;
  } else {
    avatarEl.textContent = user.displayName?.[0] || '?';
  }
  document.getElementById('nav-name').textContent = user.displayName || user.email;

  // Greeting
  const hour = new Date().getHours();
  document.getElementById('greeting-time').textContent =
    hour < 12 ? 'Good morning ☀️' : hour < 18 ? 'Good afternoon 🌤️' : 'Good evening 🌙';
  const firstName = (user.displayName || 'there').split(' ')[0];
  document.getElementById('greeting-name').innerHTML = `Welcome back, <em>${firstName}</em>`;

  // Load user data
  try {
    const userRef = db.collection('users').doc(user.uid);
    const doc = await userRef.get();
    const data = doc.exists ? doc.data() : {};

    // Stats
    document.getElementById('stat-streak').textContent = data.streak || 0;
    document.getElementById('longest-streak').textContent = data.longestStreak || 0;
    document.getElementById('stat-correct').textContent = data.totalCorrect || 0;
    document.getElementById('stat-sessions').textContent = data.totalSessions || 0;

    const secs = data.totalSeconds || 0;
    if (secs >= 3600) {
      document.getElementById('stat-time').textContent = (secs/3600).toFixed(1);
      document.getElementById('stat-time-unit').textContent = 'hours';
    } else {
      document.getElementById('stat-time').textContent = Math.floor(secs/60);
    }

    // Week streak
    renderWeek(data.studyDates || []);

    // Topics
    renderTopics(data.progress || {}, data.unlocked || {});

    // History
    const sessions = await userRef.collection('sessions')
      .orderBy('date','desc').limit(10).get();
    renderHistory(sessions.docs.map(d => d.data()));

  } catch(e) {
    console.error(e);
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
});

function renderWeek(studyDates) {
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const today = new Date();
  const todayStr = today.toISOString().split('T')[0];
  const grid = document.getElementById('week-days');
  grid.innerHTML = '';

  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const dStr = d.toISOString().split('T')[0];
    const dayName = days[d.getDay() === 0 ? 6 : d.getDay() - 1];
    const done = studyDates.includes(dStr);
    const isToday = dStr === todayStr;

    grid.innerHTML += `
      <div class="day-col">
        <div class="day-name">${dayName}</div>
        <div class="day-dot ${done?'done':''} ${isToday?'today':''}">${done?'✓':''}</div>
      </div>`;
  }
}

function renderTopics(progress, unlocked) {
  const grid = document.getElementById('topics-grid');
  grid.innerHTML = '';
  TOPICS.forEach((t, i) => {
    const dp = progress[`${t.id}_dictation`] || 0;
    const sp = progress[`${t.id}_shadowing`] || 0;
    // Topic 1 always unlocked, others need previous topic passed
    const isUnlocked = i === 0 || unlocked[`topic${t.id - 1}`] === true;
    const passed = unlocked[`topic${t.id}`] === true;

    if (isUnlocked) {
      grid.innerHTML += `
        <div class="topic-card">
          <div class="topic-top">
            <div class="topic-emoji">${t.emoji}</div>
            <div>
              <div class="topic-num">Topic ${i+1} ${passed ? '<span style="color:var(--green);font-size:0.7rem">✅ Passed</span>' : ''}</div>
              <div class="topic-name">${t.title}</div>
            </div>
          </div>
          <div class="topic-body">
            <div class="prog-row">
              <span class="prog-icon">✍️</span>
              <div class="prog-rail"><div class="prog-fill" style="width:${dp}%"></div></div>
              <span class="prog-pct">${dp}%</span>
            </div>
            <div class="prog-row">
              <span class="prog-icon">🎤</span>
              <div class="prog-rail"><div class="prog-fill" style="width:${sp}%;background:var(--green)"></div></div>
              <span class="prog-pct">${sp}%</span>
            </div>
            <div class="topic-actions">
              <button class="btn-mode" onclick="startLesson(${t.id},'dictation')">✍️ Dictation</button>
              <button class="btn-mode" onclick="startLesson(${t.id},'shadowing')">🎤 Shadowing</button>
            </div>
          </div>
        </div>`;
    } else {
      // Locked topic
      grid.innerHTML += `
        <div class="topic-card" style="opacity:0.5;pointer-events:none">
          <div class="topic-top">
            <div class="topic-emoji">🔒</div>
            <div>
              <div class="topic-num">Topic ${i+1}</div>
              <div class="topic-name">${t.title}</div>
            </div>
          </div>
          <div class="topic-body">
            <div style="font-size:0.78rem;color:var(--text3);text-align:center;padding:0.5rem 0">
              Complete Topic ${i} with 80%+ to unlock
            </div>
          </div>
        </div>`;
    }
  });
}

function renderHistory(sessions) {
  const list = document.getElementById('history-list');
  if (!sessions.length) {
    list.innerHTML = '<div class="empty-state">No sessions yet — start your first lesson! 🎯</div>';
    return;
  }
  list.innerHTML = '';
  sessions.forEach(s => {
    const topic = TOPICS.find(t => t.id === s.topicId);
    const mins = Math.floor((s.duration||0)/60);
    const date = new Date(s.date).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    list.innerHTML += `
      <div class="history-item">
        <div class="h-icon">${topic?.emoji||'📚'}</div>
        <div class="h-info">
          <div class="h-title">${topic?.title||'Unknown topic'}</div>
          <div class="h-meta">${s.mode==='dictation'?'✍️ Dictation':'🎤 Shadowing'} · ${mins} min</div>
        </div>
        <div class="h-right">
          <div class="h-correct">✅ ${s.correct||0} correct</div>
          <div class="h-date">${date}</div>
        </div>
      </div>`;
  });
}

function startLesson(topicId, mode) {
  sessionStorage.setItem('ll_topic', topicId);
  sessionStorage.setItem('ll_mode', mode);
  window.location.href = 'lesson.html';
}

async function signOut() {
  await auth.signOut();
  window.location.href = 'index.html';
}
</script>
</body>
</html>
